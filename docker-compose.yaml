services:
  goph:
    image: goph-server
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: server
    depends_on:
      - psql
      - minio-init
    ports:
      - "8080:8080"
    environment:
      GOPH_ADDR: ":8080"
      GOPH_DATABASE: "postgres://dev:dev@psql:5432/goph?sslmode=disable"
      GOPH_BUCKET: "goph"
      GOPH_REGION: "eu-east-1"
      GOPH_ENDPOINT: "http://minio:9000"
      GOPH_ACCESS_KEY: "admin"
      GOPH_SECRET_KEY: "admin12345"
      GOPH_USE_SSL: false
      GOPH_BROKERS: kafka:9092

  goph-outbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: outbox
    environment:
      GOPH_DATABASE: "postgres://dev:dev@psql:5432/goph?sslmode=disable"
      GOPH_BROKERS: "kafka:9092"
    depends_on:
      - goph
      - psql
      - kafka-init


  goph-inbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: inbox
    environment:
      GOPH_DATABASE: "postgres://dev:dev@psql:5432/goph?sslmode=disable"
      GOPH_BROKERS: "kafka:9092"
      GOPH_BUCKET: "goph"
      GOPH_REGION: "eu-east-1"
      GOPH_ENDPOINT: "http://minio:9000"
      GOPH_ACCESS_KEY: "admin"
      GOPH_SECRET_KEY: "admin12345"
      GOPH_USE_SSL: false
    depends_on:
      - goph
      - psql
      - kafka-init
      - minio-init

  psql:
    image: postgres:17-alpine
    volumes:
      - psql:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: goph
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin admin12345;
      mc mb -p local/goph;
      exit 0;
      "

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - kafka
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting for Kafka..."
        cub kafka-ready -b kafka:9092 1 60
        
        kafka-topics \
          --bootstrap-server kafka:9092 \
          --create \
          --if-not-exists \
          --topic avatar \
          --partitions 3 \
          --replication-factor 1
        
        kafka-topics \
          --bootstrap-server kafka:9092 \
          --list
volumes:
  psql:
  minio_data: