<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    {{ range .Images }}
    {{ if .Original }}
    <img src="{{ .Original }}" alt="{{ .Name }}"/>
    {{ end }}

    {{ if .S300 }}
    <img src="{{ .S300 }}" alt="{{ .Name }}"/>
    {{ end }}

    {{ if .S100 }}
    <img src="{{ .S100 }}" alt="{{ .Name }}"/>
    {{ end }}
    {{ end }}
</body>
</html>
